<!DOCTYPE html>
<html>
<head>
  <title>Tag Grid Print</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
    }
    .grid img {
      width: 100%;
      height: auto;
    }
    @media print {
      body {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="grid">
    <img src="output/mic_tag_1.svg" />
    <img src="output/mic_tag_2.svg" />
    <img src="output/mic_tag_3.svg" />
    <img src="output/mic_tag_4.svg" />
    <img src="output/mic_tag_5.svg" />
    <img src="output/mic_tag_6.svg" />
    <img src="output/mic_tag_7.svg" />
    <img src="output/mic_tag_8.svg" />
    <img src="output/mic_tag_9.svg" />
    <img src="output/mic_tag_10.svg" />
    <img src="output/mic_tag_11.svg" />
    <img src="output/mic_tag_12.svg" />
    <img src="output/mic_tag_13.svg" />
    <img src="output/mic_tag_14.svg" />
    <img src="output/mic_tag_15.svg" />
    <img src="output/mic_tag_16.svg" />
    <img src="output/mic_tag_17.svg" />
    <img src="output/mic_tag_18.svg" />
    <img src="output/mic_tag_19.svg" />
    <img src="output/mic_tag_20.svg" />
    <img src="output/mic_tag_21.svg" />
    <img src="output/mic_tag_22.svg" />
  </div>
</body>
</html>
