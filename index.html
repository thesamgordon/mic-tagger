<!DOCTYPE html>
<html>
  <head>
    <title>Tag Grid Print</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(45mm, 1fr));
        background-color: #e8e8e8;
        grid-gap: 1px;
        border: #e8e8e8 1px solid;
      }

      .grid img {
        width: 100%;
        height: auto;
        background-color: white;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="grid">{DATA}</div>
  </body>
</html>
