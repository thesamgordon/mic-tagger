<svg xmlns="http://www.w3.org/2000/svg" width="280" height="70">
    <style>
        .number {
            font-family: Inter;
            font-size: 100px;
            font-weight: 900;
            text-anchor: middle;
            dominant-baseline: middle;
            line-height: .5;
            fill: rgba(105, 2, 2, .15);
            letter-spacing: -0.03em;
        }

        .character {
            font-family: Inter;
            font-size: 18px;
            font-weight: 900;
            text-anchor: start;
            fill: #4D0B4B;
            letter-spacing: -0.03em;
        }

        .name {
            font-family: Inter;
            font-size: 15px;
            font-weight: 400;
            text-anchor: start;
            fill: #4D0B4B;
            letter-spacing: -0.03em;
        }

        .title {
            font-family: Inter;
            font-size: 10px;
            fill: #4D0B4B;
            font-weight: 400;
            letter-spacing: -0.03em;
        }
    </style>
    <text class="number" x="215" y="23" dy="22px">{NUMBER}</text>
    <text class="character" x="20" y="32">{PERSON}</text>
    <text class="name" x="20" y="48">{CHARACTER}</text>
    <text class="title" x="97%" y="95%" text-anchor="end" dominant-baseline="text-after-edge">
        {TITLE}
    </text>
</svg>