<!doctype html>
<html>
  <head>
    <title>Tag Grid Print</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(45mm, 1fr));
      }

      .grid img {
        width: 100%;
        display: block;
        background-color: white;
        background-image:
          linear-gradient(to left, #e8e8e8 5px, transparent 5px),
          linear-gradient(to bottom, #e8e8e8 5px, transparent 5px),
          linear-gradient(to right, #e8e8e8 5px, transparent 5px),
          linear-gradient(to top, #e8e8e8 5px, transparent 5px);

        background-size:
          5px 0.5px,
          0.5px 5px,
          5px 0.5px,
          0.5px 5px;

        background-position:
          100% 0,
          100% 0,
          0 100%,
          0 100%;

        background-repeat: no-repeat;
      }
    </style>
  </head>
  <body>
    <div class="grid">{DATA}</div>
  </body>
</html>
