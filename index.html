<!DOCTYPE html>
<html>
<head>
  <title>Tag Grid Print</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }
    .grid img {
      width: 100%;
      height: auto;
    }
    @media print {
      body {
        margin: 0;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="grid">
{DATA}
  </div>
</body>
</html>
